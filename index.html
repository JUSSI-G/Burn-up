<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Hades Burn-up Tool</title>
    
    <!-- 1. React Core (Pinned to stable 18.2.0 production) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 2. Prop-Types (CRITICAL: Recharts depends on this being global to avoid 'oneOfType' errors) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- 3. Recharts (Pinned to 2.12.7) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <!-- 4. Babel for JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 5. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        /* Loading state style */
        #root:empty::before {
            content: "Initializing Application...";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #64748b;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Destructure from Global objects provided by CDN scripts
        // Using window.Recharts explicitly to ensure the UMD bundle is captured
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, 
            Tooltip, Legend, ResponsiveContainer 
        } = window.Recharts;

        const { useState, useMemo } = React;

        // Custom SVG Icons for maximum reliability (no external font dependencies)
        const Icons = {
            Layout: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-teal-600"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            ),
            Plus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            ),
            Trash: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            ),
            Trend: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-teal-500"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            ),
            Check: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-teal-500"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
            )
        };

        const App = () => {
            const [sprints, setSprints] = useState([
                { id: 1, label: 'Sprint 1', incrementalScope: 0, incrementalCompleted: 0 },
                { id: 2, label: 'Sprint 2', incrementalScope: 0, incrementalCompleted: 0 },
                { id: 3, label: 'Sprint 3', incrementalScope: 0, incrementalCompleted: 0 },
            ]);

            const chartData = useMemo(() => {
                let runningScope = 0;
                let runningCompleted = 0;
                const cumulatives = sprints.map(s => {
                    runningScope += (parseFloat(s.incrementalScope) || 0);
                    runningCompleted += (parseFloat(s.incrementalCompleted) || 0);
                    return { scope: runningScope, completed: runningCompleted };
                });

                const data = [];
                data.push({
                    displayLabel: '0',
                    scope: cumulatives.length > 0 ? cumulatives[0].scope : 0,
                    completed: 0,
                });

                sprints.forEach((s, i) => {
                    data.push({
                        displayLabel: s.label.replace('Sprint ', ''), 
                        scope: cumulatives[i + 1] ? cumulatives[i + 1].scope : cumulatives[i].scope,
                        completed: cumulatives[i].completed,
                    });
                });
                return data;
            }, [sprints]);

            const updateSprint = (id, field, value) => {
                const val = value === "" ? 0 : parseFloat(value);
                setSprints(prev => prev.map(s => s.id === id ? { ...s, [field]: val } : s));
            };

            const addSprint = () => {
                const lastSprint = sprints[sprints.length - 1];
                const nextNum = lastSprint ? parseInt(lastSprint.label.replace('Sprint ', '')) + 1 : 1;
                setSprints([...sprints, {
                    id: Date.now(),
                    label: `Sprint ${nextNum}`,
                    incrementalScope: 0,
                    incrementalCompleted: 0
                }]);
            };

            const deleteSprint = (id) => {
                if (sprints.length > 1) setSprints(sprints.filter(s => s.id !== id));
            };

            const totalScope = sprints.reduce((acc, s) => acc + (parseFloat(s.incrementalScope) || 0), 0);
            const totalDone = sprints.reduce((acc, s) => acc + (parseFloat(s.incrementalCompleted) || 0), 0);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto space-y-6">
                        <header className="flex flex-col md:flex-row gap-4">
                            <div className="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h1 className="text-xl font-black text-slate-800 flex items-center gap-2">
                                    <Icons.Layout />
                                    BURN-UP
                                </h1>
                                <p className="text-slate-500 text-sm mt-1">Project tracking dashboard (Credits to Jussi)</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-center items-center min-w-[160px]">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Scope</span>
                                <span className="text-2xl font-black text-orange-500">{totalScope} pts</span>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-center items-center min-w-[160px]">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Done</span>
                                <span className="text-2xl font-black text-teal-600">{totalDone} pts</span>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                <div className="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                                    <h2 className="font-bold text-slate-700 text-sm uppercase tracking-wider">Sprint Entries</h2>
                                    <button onClick={addSprint} className="bg-slate-800 hover:bg-slate-900 text-white text-[10px] font-black py-2 px-3 rounded-lg flex items-center gap-1">
                                        <Icons.Plus /> ADD SPRINT
                                    </button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-400 text-[10px] font-black uppercase">
                                                <th className="px-4 py-3 text-left">Sprint</th>
                                                <th className="px-2 py-3 text-center">New Scope</th>
                                                <th className="px-2 py-3 text-center">Pts Done</th>
                                                <th className="px-4 py-3"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {sprints.map((s) => (
                                                <tr key={s.id} className="hover:bg-teal-50/30 group transition-colors">
                                                    <td className="px-4 py-4 font-bold text-slate-600">{s.label}</td>
                                                    <td className="px-2 py-2">
                                                        <input type="number" value={s.incrementalScope} 
                                                            onFocus={(e) => e.target.select()}
                                                            onChange={(e) => updateSprint(s.id, 'incrementalScope', e.target.value)}
                                                            className="w-full text-center border border-slate-200 rounded-md py-1.5 focus:ring-2 focus:ring-orange-400 outline-none font-bold" 
                                                        />
                                                    </td>
                                                    <td className="px-2 py-2">
                                                        <input type="number" value={s.incrementalCompleted} 
                                                            onFocus={(e) => e.target.select()}
                                                            onChange={(e) => updateSprint(s.id, 'incrementalCompleted', e.target.value)}
                                                            className="w-full text-center border border-slate-200 rounded-md py-1.5 focus:ring-2 focus:ring-teal-400 outline-none font-bold text-teal-700" 
                                                        />
                                                    </td>
                                                    <td className="px-4 py-2 text-right">
                                                        <button onClick={() => deleteSprint(s.id)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                                                            <Icons.Trash />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-teal-50 text-teal-800 text-[11px] flex gap-3 border-t border-teal-100 italic mt-auto">
                                    <Icons.Check />
                                    <span>Enter incremental points per sprint. Total values update in the chart.</span>
                                </div>
                            </div>

                            <div className="lg:col-span-7 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h2 className="font-bold text-slate-700 mb-6 flex items-center gap-2 uppercase tracking-widest text-xs">
                                    <Icons.Trend /> Performance Chart
                                </h2>
                                <div className="h-[400px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={chartData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="displayLabel" axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 11, fontWeight: 700}} dy={10} interval={0} />
                                            <YAxis axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 11}} domain={[0, 'auto']} />
                                            <Tooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)', padding: '12px' }} />
                                            <Legend verticalAlign="top" height={40} iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: '900', textTransform: 'uppercase' }} />
                                            
                                            {/* StepAfter ensures the orange scope line jumps vertically at the start of each interval */}
                                            <Line type="stepAfter" dataKey="scope" name="Total Scope" stroke="#f59e0b" strokeWidth={3} dot={false} activeDot={{ r: 6 }} />
                                            
                                            {/* Linear ensures the teal line slopes diagonally from label to label */}
                                            <Line type="linear" dataKey="completed" name="Cumulative Completed" stroke="#0d9488" strokeWidth={5} 
                                                dot={{ r: 6, fill: '#0d9488', stroke: 'white', strokeWidth: 3 }}
                                                activeDot={{ r: 8 }} 
                                            />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
